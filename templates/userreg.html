<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — GlaucomaAI</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0b1f3a;
      --teal: #0d9488;
      --teal-light: #99f6e4;
      --border: rgba(255,255,255,0.1);
      --white: #ffffff;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 1rem 2rem;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 3rem;
      border-bottom: 1px solid var(--border);
      background: rgba(11,31,58,0.9);
      backdrop-filter: blur(10px);
      z-index: 10;
    }
    .logo { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--teal-light); text-decoration: none; }
    .logo span { color: var(--white); }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
    }

    .card-title { font-family: 'DM Serif Display', serif; font-size: 1.8rem; margin-bottom: 0.4rem; }
    .card-sub { font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-bottom: 2rem; }

    .flash-box {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #fca5a5;
      font-size: 0.85rem;
      margin-bottom: 1.2rem;
    }
    .flash-success {
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.3);
      color: #6ee7b7;
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.4rem; color: rgba(255,255,255,0.7); }

    input[type=email], input[type=password], input[type=text], input[type=tel], textarea {
      width: 100%;
      padding: 0.72rem 1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--teal); }
    textarea { resize: vertical; min-height: 80px; }

    .btn-submit {
      width: 100%;
      padding: 0.85rem;
      background: var(--teal);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-submit:hover { background: #0f766e; transform: translateY(-1px); }

    .card-footer { text-align: center; margin-top: 1.5rem; font-size: 0.88rem; color: rgba(255,255,255,0.5); }
    .card-footer a { color: var(--teal-light); text-decoration: none; }
    .card-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">Glaucoma<span>AI</span></a>
  </nav>

  <div class="card">
    <h1 class="card-title">Create account</h1>
    <p class="card-sub">Register to start using the detection tool</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash-box">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/userregister">
      <div class="form-row">
        <div class="form-group">
          <label for="fname">First name</label>
          <input type="text" id="fname" name="fname" placeholder="John" required>
        </div>
        <div class="form-group">
          <label for="lname">Last name</label>
          <input type="text" id="lname" name="lname" placeholder="Doe" required>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone number</label>
        <input type="tel" id="phone" name="phone" placeholder="+91 00000 00000">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a strong password" required>
      </div>

      <div class="form-group">
        <label for="address">Address</label>
        <textarea id="address" name="address" placeholder="Your address (optional)"></textarea>
      </div>

      <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <div class="card-footer">
      Already have an account? <a href="/userloginpage">Sign in</a>
    </div>
  </div>

</body>
</html>
