<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Glaucoma AI{% endblock %}</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; background: #0b1f3a; color: #fff; margin: 0; min-height: 100vh; }
    .container { max-width: 960px; margin: 2rem auto; padding: 1rem; }
    .card { background: rgba(255,255,255,0.08); border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); padding: 1.8rem; }
    .flashes .alert { background: rgba(220, 38, 38, 0.15); border: 1px solid rgba(239,68,68,0.4); color: #ffc3c3; padding: 0.65rem 0.9rem; border-radius: 6px; margin-bottom: 0.75rem; }
    .card h2 { color: #dbeafe; margin-top: 0; }
    a { color: #7dd3fc; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
